<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Login with EmbeHome</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-material-design/4.1.3/css/bootstrap-material-design.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css?family=Nunito+Sans:200,400,600');

        body {
            background: #ffffff;
            font-family: 'Nunito Sans', sans-serif;
        }

        .container {
            padding: 0px;
        }

        .header {
            display: block;
            padding: 14px 10px 16px;
            background: #FCFCFC;
            border-bottom: 1px solid #EEEEEE;
            text-align: center;
        }

        .header img {
            max-width: 100%;
            display: inline-block;
            outline: none;
        }

        .bdcont {
            padding: 32px 16px 24px 16px;
        }

        .bdcont form {
            padding: 5% 0;
        }

        .bdcont .title,
        .bdcont .sub-title {
            display: block;
            text-align: center;
            font-family: inherit;
        }

        .bdcont .title {
            font-size: 24px;
            font-weight: 200;
            color: #333333;
        }

        .bdcont .sub-title,
        .info {
            font-size: 14px;
            font-weight: 400;
            color: #545454;
            text-align: center;
            line-height: 20px;
        }

        .info {
            padding: 20px 0px 50px;
        }

        .tx-button {
            display: block;
            text-align: center;
            margin-bottom: 32px;
            margin-top: 40px !important;
        }

        .tx-button .btn {
            background-color: #cd9548 !important;
            font-family: inherit;
            font-weight: 400;
            padding-right: 50px;
            padding-left: 50px;
            box-shadow: none !important;
            margin-bottom: 0px !important;
            font-size: 16px;
        }

        .btn-link {
            display: inline-block;
            font-weight: 300 !important;
            margin-bottom: 24px !important;
        }

        .btn-link:hover {
            text-decoration: none;
        }

        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="header">
        <img src="./Login with tronx_files/logo2.png" alt="EmbeHome">
    </div>

    <div class="bdcont">
        <h4 class="title">Login</h4>
        <label class="sub-title">Login with your existing EmbeHome Credentials</label>
        <label class="sub-title" id="accountLinkInfo"></label>

        <form id="submitUserDetails" novalidate="novalidate">
            <div class="form-group bmd-form-group">
                <label class="bmd-label-floating" for="email">Email</label>
                <input class="form-control" id="email" type="email" name="email">
            </div>

            <div class="form-group bmd-form-group">
                <label class="bmd-label-floating" for="password">Password</label>
                <input class="form-control" id="password" type="password" name="password">
            </div>

            <div>
                <input id="redirect_uri" type="hidden" name="redirect_uri" value="">
                <input id="state" type="hidden" name="state" value="">
                <input id="client_id" type="hidden" name="client_id" value="">
                <input id="response_type" type="hidden" name="response_type" value="">
            </div>

            <div id="postResultDiv"></div>

            <div class="tx-button">
                <button class="btn btn-primary btn-raised" type="submit">Submit</button>
            </div>

            <div class="text-center">
                <a class="btn-link" href="https://2ssquare.in/api/aws/forgotpassword">Forgot password?</a>
            </div>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-material-design/4.1.3/js/bootstrap-material-design.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

<script>
    $(document).ready(function () {
        if ($.fn.bootstrapMaterialDesign) {
            $('body').bootstrapMaterialDesign();
        }

        var urlParams = new URLSearchParams(window.location.search);

        var state = urlParams.get("state") || "";
        var redirect_uri = urlParams.get("redirect_uri") || "";
        var client_id = urlParams.get("client_id") || "";
        var response_type = urlParams.get("response_type") || "";

        $("#state").val(state);
        $("#redirect_uri").val(redirect_uri);
        $("#client_id").val(client_id);
        $("#response_type").val(response_type);

        if (redirect_uri.indexOf("oauth-redirect.googleusercontent.com") !== -1) {
            $("#accountLinkInfo").text("By signing in, you are authorizing Google to access your devices.");
        }

        $("#submitUserDetails").validate({
            rules: {
                email: {
                    required: true,
                    email: true
                },
                password: {
                    required: true
                }
            },

            messages: {
                email: {
                    required: "Please enter your email",
                    email: "Please enter a valid email"
                },
                password: {
                    required: "Please enter your password"
                }
            },

            submitHandler: function (form) {
                $("#postResultDiv").html("");

                var formData = {
                    email: $("#email").val(),
                    password: $("#password").val(),
                    realm: "Smartron",
                    redirect_uri: $("#redirect_uri").val(),
                    state: $("#state").val(),
                    client_id: $("#client_id").val(),
                    response_type: $("#response_type").val()
                };

                if (!formData.redirect_uri || !formData.state) {
                    $("#postResultDiv").html(
                        "<p style='color:red'>Invalid account linking request. Please start linking again from Alexa or Google Home.</p>"
                    );
                    return false;
                }

                $.ajax({
                    type: "POST",
                    contentType: "application/json",
                    url: "https://2ssquare.in/api/aws/authorization",
                    data: JSON.stringify(formData),
                    dataType: "json",
                    success: function (res) {
                        console.log(JSON.stringify(res));
                        console.log("Redirecting to account linking redirect uri");

                        if (res && res.url_string) {
                            location.href = res.url_string;
                        } else {
                            $("#postResultDiv").html(
                                "<p style='color:red'>Unable to complete account linking. Please try again.</p>"
                            );
                        }
                    },
                    error: function (res) {
                        console.log("Error", res);
                        $("#postResultDiv").html(
                            "<p style='color:red'>Invalid Username/Password <br></p>"
                        );
                    }
                });

                return false;
            }
        });
    });
</script>
</body>
</html>
