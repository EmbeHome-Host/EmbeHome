<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login with tronx</title>
  <link rel="stylesheet" href="./Login with tronx_files/bootstrap-material-design.min.css" integrity="sha384-wXznGJNEXNG1NFsbm0ugrLFMQPWswR3lds2VeinahP8N0zJw9VWSopbjv2x7WCvX" crossorigin="anonymous">
  <style>
    @import url('https://fonts.googleapis.com/css?family=Nunito+Sans:200,400,600');

    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Nunito Sans', sans-serif;
      background: linear-gradient(135deg, #f7f8fb 0%, #eef2ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 14px 35px rgba(25, 36, 73, 0.12);
      overflow: hidden;
      border: 1px solid #eceff6;
    }

    .header {
      display: block;
      padding: 22px 18px;
      background: #fcfcfc;
      border-bottom: 1px solid #eeeeee;
      text-align: center;
    }

    .header img {
      max-width: 210px;
      width: 100%;
      display: inline-block;
      outline: none;
    }

    .bdcont {
      padding: 28px 24px 18px;
    }

    .title,
    .sub-title {
      display: block;
      text-align: center;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 600;
      color: #222b45;
    }

    .sub-title {
      font-size: 14px;
      font-weight: 400;
      color: #5d6473;
      line-height: 20px;
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-control {
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid #d8deea;
      background-color: #fbfcff;
    }

    .tx-button {
      display: block;
      text-align: center;
      margin: 26px 0 18px !important;
    }

    .tx-button .btn {
      background-color: #cd9548 !important;
      font-weight: 600;
      min-width: 180px;
      border-radius: 10px;
      padding: 10px 24px;
      box-shadow: none !important;
      margin-bottom: 0 !important;
      font-size: 16px;
      text-transform: none;
      letter-spacing: 0.2px;
    }

    .tx-button .btn:hover {
      background-color: #bb853b !important;
    }

    #postResultDiv {
      min-height: 24px;
      text-align: center;
      font-size: 14px;
      margin-top: 6px;
    }

    .btn-link {
      display: inline-block;
      font-weight: 600 !important;
      margin-bottom: 4px !important;
      color: #4f63d8;
    }

    .btn-link:hover {
      text-decoration: none;
      color: #384fcb;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="header">
      <img src="./Login with tronx_files/logo2.png" alt="tronx">
    </div>
    <div class="bdcont">
      <h4 class="title">Login</h4>
      <label class="sub-title">Login with your existing EmbeHome ID</label>
      <form id="submitUserDetails" novalidate="novalidate">
        <div class="form-group bmd-form-group">
          <label class="bmd-label-floating" for="email">Email</label>
          <input class="form-control" id="email" type="email" name="email">
        </div>
        <div class="form-group bmd-form-group">
          <label class="bmd-label-floating" for="password">Password</label>
          <input class="form-control" id="password" type="password" name="password">
        </div>
        <div>
          <input id="redirect_uri" type="hidden" name="redirect_uri" value="https://alexa.amazon.co.jp/api/skill/link/MR5MUZUEUO35N">
          <input id="state" type="hidden" name="state" value="A2SAAEAELF4_7khhn5GzxCTLSELpb8CENXnnhjZuKcUNvmsX3cd4oQ0RHA0H_5wXGaCd_DhU1hlHMKi3Q_GdyybYBi-xd07DmPvsNYqgysyCiFFxGQpF-O56I3i7L9mNwqoIUBuoFLwCyZ4l7e-9uXqsbYZh7C--Cnh8Tlrg9U_U1sVckhkTuhAGLga5uORp5fe7iLNXjEFOoY35B5vfaQ6eYF_4P9_YnxemI46-7VQSU1op4gZAp8yT2NUrOYNe-Y_N9ndnk4dg3ze2YAHqwgzHjKrG2ZE28Ods1AQpfiJ0duRsQ0jUsU8eAzVtk3q86He7t6tOvb_DHcM8LfbrRsEwNGn3VjqwLZ1S-FAS-TXwL3S-FyRrmgwgF6a4xZAohSJm6oz-RxjanZRIvwTWgW9YPUwjrhbggukQdpsVIxRm6mekkGL2zeUPd8F4rKA2pEfZLnPA3TLOVZQxYbQZxqBVeuLhgv9CcxSPAyf7sJGGzOiDANKk6oxK4yvuCzqtlRb8k3f7jl3PLvNTo8GV5meChHHQ3IXTdfNpRAPBx2sM9NAScwxse9Xq_-DGrjqzuS011q4zZo4lXZQ7KGR14Ylvsk04iJqWTFnO5Gh8U5Zsb5-BEBRf0crpdaUZ52TMMYVaRTQc2Lw5EeBRr0qIadSqSAosKGhVqvhR4W-iWu1V8aU7pGAZjZI7mZWcjndhkhhNVTOFjzNAQOVpXaHCD1W7vw9exKFeA">
        </div>
        <div id="postResultDiv"></div>
        <div class="tx-button">
          <button class="btn btn-primary btn-raised" type="submit">Submit</button>
        </div>
        <div class="text-center">
          <a class="btn-link" href="https://2ssquare.in/api/aws/forgotpassword">Forgot password?</a>
        </div>
      </form>
    </div>
  </div>

  <script src="./Login with tronx_files/jquery.min.js.download"></script>
  <script src="./Login with tronx_files/popper.min.js.download" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="./Login with tronx_files/bootstrap-material-design.js.download" integrity="sha384-CauSuKpEqAFajSpkdjv3z9t8E7RlpJ1UP0lKM/+NdtSarroVKu069AlsRPKkFBz9" crossorigin="anonymous"></script>
  <script src="./Login with tronx_files/jquery.validate.min.js.download"></script>
  <script>
    $(document).ready(function() {
    $('body').bootstrapMaterialDesign();
	var urlParams = new URLSearchParams(window.location.search);
    var state = urlParams.get("state");
	var redirect_uri = urlParams.get("redirect_uri");
    $("#submitUserDetails").validate({
        rules: {
            email: {
                required: true,
                email: true
            },
            password: {
                required: true
            }
        },
        
        submitHandler: function (form) {

            var formData = {
                email: $("#email").val(),
                password: $("#password").val(),
                realm: "Smartron",
                redirect_uri: redirect_uri,
                state: state
            }

            $.ajax({
                type: "POST",
                contentType: "application/json",
                url: "https://2ssquare.in/api/aws/authorization",
                data: JSON.stringify(formData),
                dataType: 'json',
                success: function(res) {
                    console.log(JSON.stringify(res));
                    console.log("Redirecting to alexa redirect uri");
                    location.href = res.url_string;
                    },
                error: function(res)   {
                    console.log("Error");
                        $("#postResultDiv").html("<p style='color:red'>" + "Invalid Username/Password <br>" + "</p>");
                }
            });
            return false; // required to block normal submit since you used ajax
        }
    });


    $('#forgotpassword').validate({
        rules: {
            "email": {
                validate_email: true,
                email: true
            }
        },
        errorPlacement: function(error, element) {
            error.insertAfter(element.parent());
        },

        submitHandler: function(form) {
            var email = $(form).find("input[type=email]").val();


            var formData = {
                email: $("#email").val()
            }

            $.ajax({
                url: "/api/user/forgot_password",
                contentType: "application/json",
                type: "POST",
                dataType: 'json',
                data: JSON.stringify(formData),
                beforeSend: function(xhr, settings) {
                    $("form#forgotpassword").find("input[type='submit']").attr("disabled", true);
                },
                success: function(resp) {
                    document.getElementById("forgotpassword").reset();
                    $(".bg-danger").hide();
                    $("form#forgotpassword").find("input[type='submit']").removeClass('disabled');
                    $("form#forgotpassword").replaceWith('<div class=""><div class="activateemail-container" style="margin: 55px 0px;"><p class="activateemail-text">We have sent a password reset link to your email id <b>'+email+'<b></p></div></div>');

                },
                error: function(xhr, status, error) {
                    var resp = $.parseJSON(xhr.responseText);
                    $(".bg-danger").hide();
                    $('<p style="color:red";padding: 10px 0px;>'+resp.error+'</p>').insertAfter('#email');
                    $("form#forgotpassword").find("input[type='submit']").val('Reset').removeClass('disabled');
                },
                complete: function(xhr, status) {

                }
            });
            return false;
        }
    });


    });
  </script>
</body>
</html>
